global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 프로메테우스 자체 모니터링을 위해 스크랩 설정 추가
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: [ "localhost:9090" ]

  # 배포서버
  - job_name: "toleave-backend"
    metrics_path: /actuator/prometheus
    scrape_interval: 5s
    scheme: https
    static_configs:
      - targets: [ 'api.toleave.cloud:8080' ]

  # 로컬 서버
  - job_name: "toleave-backend-local"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'host.docker.internal:8080' ]